# Hinata production deployment: server + MongoDB replica set (2 data nodes
# + 1 arbiter) + MinIO object storage. Copy .env.example to .env first and
# run ./deploy/generate-secrets.sh to create the Mongo keyfile.
name: hinata

x-mongo-common: &mongo-common
  image: mongo:8.0
  restart: unless-stopped
  # Internal cluster auth via keyfile (SCRAM); client connections require TLS and
  # the app authenticates with a X.509 client certificate. Generate the PKI with
  #   ./deploy/x509/generate-certs.sh prod
  command: >-
    mongod --replSet rs0 --bind_ip_all --keyFile /etc/mongo/keyfile
    --tlsMode requireTLS
    --tlsCertificateKeyFile /etc/mongo/certs/server.pem
    --tlsCAFile /etc/mongo/certs/ca.crt
  volumes:
    - ./deploy/mongo-keyfile:/etc/mongo/keyfile:ro
    - ./deploy/x509/prod:/etc/mongo/certs:ro
  networks: [hinata]

services:
  mongo1:
    <<: *mongo-common
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_ROOT_USERNAME:?set in .env}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_ROOT_PASSWORD:?set in .env}
    volumes:
      - mongo1-data:/data/db
      - ./deploy/mongo-keyfile:/etc/mongo/keyfile:ro
    healthcheck:
      # Initiates the replica set on first run, then reports member health.
      test: >-
        mongosh --quiet --tls --tlsCAFile /etc/mongo/certs/ca.crt
        --tlsCertificateKeyFile /etc/mongo/certs/server.pem --host mongo1
        -u "$$MONGO_INITDB_ROOT_USERNAME" -p "$$MONGO_INITDB_ROOT_PASSWORD"
        --authenticationDatabase admin
        --eval "try { rs.status().ok } catch (e) {
          rs.initiate({_id: 'rs0', members: [
            {_id: 0, host: 'mongo1:27017', priority: 2},
            {_id: 1, host: 'mongo2:27017', priority: 1},
            {_id: 2, host: 'mongo-arbiter:27017', arbiterOnly: true}
          ]}).ok }"
      interval: 10s
      timeout: 10s
      retries: 12
      start_period: 20s

  mongo2:
    <<: *mongo-common
    volumes:
      - mongo2-data:/data/db
      - ./deploy/mongo-keyfile:/etc/mongo/keyfile:ro

  mongo-arbiter:
    <<: *mongo-common
    # Arbiter holds no data; it only votes in elections.

  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:?set in .env}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:?set in .env}
    volumes:
      - minio-data:/data
    networks: [hinata]
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 15s
      timeout: 5s
      retries: 5

  hinata-server:
    # Pulled from GHCR (built & pushed by CI). No build context is needed on the
    # deployment host / Portainer. Pin a release by setting HINATA_SERVER_TAG.
    image: ghcr.io/hinata-platform/hinata-server:${HINATA_SERVER_TAG:-latest}
    restart: unless-stopped
    depends_on:
      mongo1:
        condition: service_healthy
      minio:
        condition: service_started
    environment:
      SPRING_PROFILES_ACTIVE: prod
      HINATA_BASE_URL: ${HINATA_BASE_URL:?set in .env}
      # Frontend (Flutter web) base URL — email deep links point here.
      HINATA_WEB_BASE_URL: ${HINATA_WEB_BASE_URL:-}
      HINATA_JWT_SECRET: ${HINATA_JWT_SECRET:?set in .env}
      # X.509 client auth over TLS (no password in the URI). The app presents the
      # client certificate from HINATA_MONGO_TLS_KEYSTORE; register its subject DN
      # as the $external user via deploy/x509/init-prod-user.sh.
      HINATA_MONGODB_URI: mongodb://mongo1:27017,mongo2:27017/hinata?replicaSet=rs0&tls=true&authMechanism=MONGODB-X509&authSource=$$external
      HINATA_MONGO_TLS_ENABLED: "true"
      HINATA_MONGO_TLS_KEYSTORE: /etc/hinata/x509/hinata-app.p12
      HINATA_MONGO_TLS_KEYSTORE_PASSWORD: ${HINATA_MONGO_TLS_KEYSTORE_PASSWORD:?set in .env}
      HINATA_MONGO_TLS_TRUSTSTORE: /etc/hinata/x509/truststore.p12
      HINATA_MONGO_TLS_TRUSTSTORE_PASSWORD: ${HINATA_MONGO_TLS_TRUSTSTORE_PASSWORD:?set in .env}
      HINATA_TRUSTED_PROXIES: ${HINATA_TRUSTED_PROXIES:-}
      HINATA_SMTP_HOST: ${HINATA_SMTP_HOST:-mailpit}
      HINATA_SMTP_PORT: ${HINATA_SMTP_PORT:-1025}
      HINATA_SMTP_USERNAME: ${HINATA_SMTP_USERNAME:-}
      HINATA_SMTP_PASSWORD: ${HINATA_SMTP_PASSWORD:-}
      HINATA_SMTP_AUTH: ${HINATA_SMTP_AUTH:-false}
      HINATA_SMTP_STARTTLS: ${HINATA_SMTP_STARTTLS:-false}
      HINATA_MAIL_FROM: ${HINATA_MAIL_FROM:-hinata@localhost}
      HINATA_S3_ENDPOINT: http://minio:9000
      HINATA_S3_ACCESS_KEY: ${MINIO_ROOT_USER}
      HINATA_S3_SECRET_KEY: ${MINIO_ROOT_PASSWORD}
      HINATA_S3_BUCKET: ${HINATA_S3_BUCKET:-hinata}
      HINATA_PRIVACY_POLICY_URL: ${HINATA_PRIVACY_POLICY_URL:-}
      HINATA_APP_MIN_VERSION: ${HINATA_APP_MIN_VERSION:-1.0.0}
      HINATA_CORS_ALLOWED_ORIGINS: ${HINATA_CORS_ALLOWED_ORIGINS:-}
      HINATA_SETUP_AUTO_COMPLETE: ${HINATA_SETUP_AUTO_COMPLETE:-false}
      HINATA_SETUP_ORGANIZATION_NAME: ${HINATA_SETUP_ORGANIZATION_NAME:-}
      HINATA_SETUP_ADMIN_EMAIL: ${HINATA_SETUP_ADMIN_EMAIL:-}
      HINATA_SETUP_ADMIN_USERNAME: ${HINATA_SETUP_ADMIN_USERNAME:-}
      HINATA_SETUP_ADMIN_PASSWORD: ${HINATA_SETUP_ADMIN_PASSWORD:-}
      HINATA_SETUP_ADMIN_DISPLAY_NAME: ${HINATA_SETUP_ADMIN_DISPLAY_NAME:-}
      # Push + universal-link deep links go through the central Hinata Connect
      # gateway (no per-server Firebase). The URL is a shared constant; override
      # only for testing. See HinataProperties.Gateway.
      HINATA_GATEWAY_BASE_URL: ${HINATA_GATEWAY_BASE_URL:-https://connect.track.asta.hn}
    volumes:
      # App client certificate (keystore) + CA (truststore) for MONGODB-X509.
      - ./deploy/x509/prod/hinata-app.p12:/etc/hinata/x509/hinata-app.p12:ro
      - ./deploy/x509/prod/truststore.p12:/etc/hinata/x509/truststore.p12:ro
    ports:
      # Published on the host port the reverse proxy (cloud.asta.hn) forwards
      # api.track.asta.hn:443 → host:3356 to. Override with HINATA_PORT.
      - "${HINATA_PORT:-3356}:8080"
    networks: [hinata]

volumes:
  mongo1-data:
  mongo2-data:
  minio-data:

networks:
  hinata:
    driver: bridge
