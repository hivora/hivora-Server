# Local development infrastructure only (run the server from your IDE):
#   ./deploy/x509/setup-dev.sh          # generates certs + starts mongo + X.509 user
#   SPRING_PROFILES_ACTIVE=dev ./mvnw spring-boot:run
#
# MongoDB runs standalone with requireTLS + --auth and accepts only X.509
# clients (gold standard: TLS encryption + X.509 authentication). MinIO/Mailpit
# keep dev defaults. Images are pinned by digest-friendly minor tags (not :latest).
name: hinata-dev

services:
  mongo:
    image: mongo:8.0
    # requireTLS + client-cert verification (tlsCAFile). --auth turns on access
    # control; the X.509 user is created by deploy/x509/setup-dev.sh.
    command: >-
      mongod --bind_ip_all --auth
      --tlsMode requireTLS
      --tlsCertificateKeyFile /etc/mongo/certs/server.pem
      --tlsCAFile /etc/mongo/certs/ca.crt
    ports:
      - "127.0.0.1:27017:27017"   # loopback only — never expose dev Mongo on 0.0.0.0
    volumes:
      - mongo-dev-data:/data/db
      - ./deploy/x509/dev:/etc/mongo/certs:ro
    healthcheck:
      test: >-
        mongosh --quiet --tls --tlsCAFile /etc/mongo/certs/ca.crt
        --tlsCertificateKeyFile /etc/mongo/certs/hinata-app.pem
        --host localhost --eval "db.runCommand({ping:1}).ok" || exit 1
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

  mailpit:
    image: axllent/mailpit:v1.21
    ports:
      - "127.0.0.1:1025:1025" # SMTP
      - "127.0.0.1:8025:8025" # Web UI: http://localhost:8025

  minio:
    image: minio/minio:RELEASE.2025-04-22T22-12-26Z
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: hinata
      MINIO_ROOT_PASSWORD: hinata-dev-secret
    ports:
      - "127.0.0.1:9000:9000" # S3 API
      - "127.0.0.1:9001:9001" # Console: http://localhost:9001
    volumes:
      - minio-dev-data:/data

volumes:
  mongo-dev-data:
  minio-dev-data:
